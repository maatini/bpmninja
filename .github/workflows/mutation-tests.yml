name: Core Mutation Tests

on:
  # Täglich um 02:00 Uhr nachts (UTC)
  schedule:
    - cron: '0 2 * * *'
  # Erlaubt manuelles Ausführen über die GitHub UI
  workflow_dispatch:

jobs:
  mutation-test:
    name: Run cargo-mutants
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          # Separater Cache für Mutation-Tests, um den normalen Build-Cache nicht zu verfälschen
          shared-key: "mutation-tests"

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Run cargo-mutants (engine-core)
        id: mutants
        # Ausführung auf das Kern-Crate limitiert. Ignoriert Unit-Tests und In-Memory-Mock.
        # -j 2 verhindert OOM-Kills auf dem CI-Runner
        run: |
          cargo mutants -p engine-core -j 2 --timeout 120 --exclude-re "persistence_in_memory|tests|stress_tests" --output mutants.out -- -- --skip stress_tests
        continue-on-error: true

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-results
          path: |
            mutants.out/outcomes.json
            mutants.out/missed.txt
            mutants.out/caught.txt
            mutants.out/timeout.txt
            mutants.out/unviable.txt
          retention-days: 30

      - name: Build mutation metrics JSON
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          from datetime import datetime, timezone

          outcomes_path = "mutants.out/outcomes.json"
          metrics = {
              "source": "core-mutation-tests",
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "status": "no-data",
              "mutation_score": 0.0,
              "caught": 0,
              "missed": 0,
              "timeout": 0,
              "unviable": 0,
              "total_tested": 0,
          }

          # cargo-mutants outcomes.json schema (modern):
          # {
          #   "outcomes": [ { "summary": "CaughtMutant"|"MissedMutant"|"Unviable"|"Timeout"|"Success", ... } ],
          #   "caught": N, "missed": N, "timeout": N, "unviable": N, ...
          # }
          # Older/wrong parsers looked for m["status"] == "caught" and always got no-data.

          def parse_outcomes(data):
              if isinstance(data, dict) and all(
                  k in data for k in ("caught", "missed", "timeout", "unviable")
              ):
                  return (
                      int(data.get("caught") or 0),
                      int(data.get("missed") or 0),
                      int(data.get("timeout") or 0),
                      int(data.get("unviable") or 0),
                  )

              if isinstance(data, dict):
                  entries = data.get("outcomes", [])
              else:
                  entries = data if isinstance(data, list) else []

              caught = missed = timeout = unviable = 0
              for m in entries:
                  # Prefer modern "summary"; fall back to legacy "status"
                  label = (m.get("summary") or m.get("status") or "").lower()
                  if label in ("caughtmutant", "caught"):
                      caught += 1
                  elif label in ("missedmutant", "missed"):
                      missed += 1
                  elif label in ("timeout", "timedout", "timeoutmutant"):
                      timeout += 1
                  elif label in ("unviable", "unviablemutant"):
                      unviable += 1
                  # "Success" baseline is ignored
              return caught, missed, timeout, unviable

          if os.path.exists(outcomes_path):
              with open(outcomes_path, "r", encoding="utf-8") as f:
                  data = json.load(f)

              caught, missed, timeout, unviable = parse_outcomes(data)
              total_tested = caught + missed + timeout
              score = (caught / total_tested * 100.0) if total_tested else 0.0

              metrics.update(
                  {
                      "status": "ok" if total_tested > 0 or unviable > 0 else "no-data",
                      "mutation_score": round(score, 1),
                      "caught": caught,
                      "missed": missed,
                      "timeout": timeout,
                      "unviable": unviable,
                      "total_tested": total_tested,
                  }
              )

          with open("mutation-metrics.json", "w", encoding="utf-8") as f:
              json.dump(metrics, f, indent=2)

          print(json.dumps(metrics, indent=2))
          PY

      - name: Upload mutation metrics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutation-metrics
          path: mutation-metrics.json
          retention-days: 30

      - name: Generate Job Summary
        if: always()
        run: |
          python3 - <<'PY'
          import json, os, sys

          out_file = "mutants.out/outcomes.json"
          if not os.path.exists(out_file):
              print("⚠️ Keine Mutation-Ergebnisse (outcomes.json) gefunden.")
              sys.exit(0)

          with open(out_file) as f:
              data = json.load(f)

          def parse_outcomes(data):
              if isinstance(data, dict) and all(
                  k in data for k in ("caught", "missed", "timeout", "unviable")
              ):
                  return (
                      int(data.get("caught") or 0),
                      int(data.get("missed") or 0),
                      int(data.get("timeout") or 0),
                      int(data.get("unviable") or 0),
                      data.get("outcomes", []) if isinstance(data.get("outcomes"), list) else [],
                  )
              if isinstance(data, dict):
                  entries = data.get("outcomes", [])
              else:
                  entries = data if isinstance(data, list) else []
              caught = missed = timeout = unviable = 0
              for m in entries:
                  label = (m.get("summary") or m.get("status") or "").lower()
                  if label in ("caughtmutant", "caught"):
                      caught += 1
                  elif label in ("missedmutant", "missed"):
                      missed += 1
                  elif label in ("timeout", "timedout", "timeoutmutant"):
                      timeout += 1
                  elif label in ("unviable", "unviablemutant"):
                      unviable += 1
              return caught, missed, timeout, unviable, entries

          caught, missed, timeout, unviable, entries = parse_outcomes(data)
          total_tested = caught + missed + timeout
          score = (caught / total_tested * 100) if total_tested > 0 else 0

          summary = f"""## 🧬 Mutation Testing Results

          **Mutation Score: {score:.1f}%**

          - ✅ **Caught (Erkannt):** {caught}
          - ❌ **Missed (Überlebt):** {missed}
          - ⏱️ **Timeout:** {timeout}
          - ⚠️ **Unviable (Kompiliert nicht):** {unviable}

          """

          if missed > 0:
              summary += "### ❌ Überlebende Mutanten (Beispiele)\n"
              summary += "| Pfad | Zeile | Mutation |\n|---|---|---|\n"
              missed_list = [
                  m for m in entries
                  if (m.get("summary") or m.get("status") or "").lower()
                  in ("missedmutant", "missed")
              ][:10]
              for m in missed_list:
                  scenario = m.get("scenario") or {}
                  mutant = scenario.get("Mutant") if isinstance(scenario, dict) else None
                  if not isinstance(mutant, dict):
                      mutant = m.get("mutant") or {}
                  file = mutant.get("file") or mutant.get("source_file") or "unknown"
                  span = mutant.get("span") or {}
                  start = span.get("start") if isinstance(span, dict) else None
                  line = start.get("line") if isinstance(start, dict) else mutant.get("line", "?")
                  mut = mutant.get("replacement", "unknown mutation")
                  summary += f"| `{file}` | {line} | `{mut}` |\n"

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as summary_file:
              summary_file.write(summary)
          PY
