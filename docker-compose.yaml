services:
  nats:
    image: nats:alpine
    command: ["--js", "--sd", "/data"]
    ports:
      - "4222:4222" # Client Connections
      - "8222:8222" # HTTP Monitoring
    volumes:
      - nats-data:/data

  engine-server:
    build:
      context: .
      dockerfile: engine-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    depends_on:
      - nats

volumes:
  nats-data:
